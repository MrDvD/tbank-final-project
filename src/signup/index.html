<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-News: Sign-up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bodyContent">
  <header class="header-back"></header>
  <header class="header-root">
    <section class="header-left-side">
      <a href="/" class="header-site-logo">
        <img src="/resources/svg/tbank.svg" alt="T-News Logo">
      </a>
    </section>
  </header>
  <span class="window-root">
    <div class="window-box">
      <header class="window-header">
        <p>Регистрация</p>
      </header>
      <section class="window-rows-container">
        <label class="window-row">
          <input type="text" class="field-input medium" name="login" placeholder="Логин" autocomplete="off" required>
        </label>
        <label class="window-row">
          <input type="password" class="field-input medium" name="password" placeholder="Пароль" autocomplete="off" required>
        </label>
        <label class="window-row">
          <input type="password" class="field-input medium" name="password-again" placeholder="Повторите пароль" autocomplete="off" required>
        </label>
      </section>
      <footer class="window-footer">
        <button type="button" class="button secondary medium">
          <p>Войти</p>
        </button>
        <button type="submit" class="button primary medium">
          <p>Зарегистрироваться</p>
        </button>
      </footer>
    </div>
  </span>
</div>
</body>
</html>
