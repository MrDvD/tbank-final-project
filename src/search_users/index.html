<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-News: Search</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>
<body>
<div id="bodyContent">
  <header class="header-back"></header>
  <header class="header-root">
    <section class="header-left-side">
      <a href="/" class="header-site-logo">
        <img src="/resources/svg/tbank.svg" alt="T-News Logo">
      </a>
      <label class="header-search">
        <input type="text" class="field-input small" placeholder="Поиск по T-News">
      </label>
    </section>
    <section class="header-right-side"></section>
  </header>
  <span class="window-root">
    <section class="search-filters">
      <button class="button filter small">
        <p>Пользователи</p>
      </button>
      <button class="button filter small inactive">
        <p>Посты</p>
      </button>
    </section>
    <section class="stack-list">
      <header class="card-header">
        <a href="/user">
          <img src="/resources/png/image1.png" alt="Profile picture" class="card-profile-pic">
          <p>Гай Юлий Цезарь Випсаниан</p>
        </a>
      </header>
      <header class="card-header">
        <a href="/user">
          <img src="/resources/png/image1.png" alt="Profile picture" class="card-profile-pic">
          <p>Гай Юлий Гигин</p>
        </a>
      </header>
      <header class="card-header">
        <a href="/user">
          <img src="/resources/png/image1.png" alt="Profile picture" class="card-profile-pic">
          <p>Гай Юлий Цезарь Октавиан Август</p>
        </a>
      </header>
      <header class="card-header">
        <a href="/user">
          <img src="/resources/png/image1.png" alt="Profile picture" class="card-profile-pic">
          <p>Гай Юлий Цезарь</p>
        </a>
      </header>
    </section>
  </span>
</div>
</body>
</html>
